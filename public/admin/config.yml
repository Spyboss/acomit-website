backend:
  name: github
  repo: Spyboss/acomit-website
  branch: master
  squash_merges: true

media_folder: "public/assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Homepage Settings"
    files:
      - name: "home"
        label: "Homepage"
        file: "src/content/settings/home.md"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "About Text", name: "about_text", widget: "markdown" }

  - name: "services"
    label: "Services"
    label_singular: "Service"
    folder: "src/content/services"
    create: true
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - label: "Icon"
        name: "icon"
        widget: "select"
        options:
          - { label: "Code", value: "code" }
          - { label: "Globe", value: "globe" }
          - { label: "Smartphone", value: "smartphone" }
          - { label: "Package", value: "package" }
      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0 }

  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/content/products"
    create: true
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Color Theme"
        name: "color"
        widget: "select"
        options:
          - { label: "Blue", value: "blue" }
          - { label: "Green", value: "green" }
          - { label: "Orange", value: "orange" }
          - { label: "Purple", value: "purple" }
      - label: "Icon"
        name: "icon"
        widget: "select"
        options:
          - { label: "Package (Inventory)", value: "package" }
          - { label: "Credit Card (POS)", value: "credit-card" }
          - { label: "Users (Welfare)", value: "users" }
          - { label: "Chart (Comparator)", value: "chart" }
      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0 }
